<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REMOVE UNEMPLOYMENT FROM EARTH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
}
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:radial-gradient(circle at top,#1e3a8a,#050816);
}
.card{
max-width:900px;
padding:40px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:24px;
box-shadow:0 0 40px rgba(37,99,235,.3);
}
h1{font-size:3rem;margin-bottom:20px}
p{opacity:.9;margin-bottom:20px}
button{
padding:15px 30px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}
button:hover{transform:scale(1.05)}
.hidden{display:none}
.loader{
width:100%;
height:24px;
background:#1f2937;
border-radius:999px;
overflow:hidden;
margin:20px 0;
}
.bar{
height:100%;
width:0%;
background:#2563eb;
transition:.2s;
}
#status{margin:15px 0}
iframe{
width:100%;
height:500px;
border:none;
border-radius:20px;
margin-top:20px;
}
</style>
</head>
<body>

<section class="hero">
<div class="card">
<h1>🚀 REMOVE UNEMPLOYMENT FROM EARTH</h1>
<p>Welcome to the world's most advanced AI-powered hiring platform.</p>

<div id="stage1">
<button onclick="startAnalysis()">Apply Now</button>
</div>

<div id="stage2" class="hidden">
<h2>AI Candidate Analysis</h2>
<div class="loader"><div class="bar" id="bar"></div></div>
<p id="status">Initializing...</p>
</div>

<div id="stage3" class="hidden">
<h2>🎉 Congratulations!</h2>
<p>You have successfully reached the final hiring stage.</p>
<p>Meeting your hiring manager...</p>

<iframe
src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
allow="autoplay"
allowfullscreen>
</iframe>
</div>

</div>
</section>

<script>
function startAnalysis(){
document.getElementById('stage1').classList.add('hidden');
document.getElementById('stage2').classList.remove('hidden');

const bar=document.getElementById('bar');
const status=document.getElementById('status');

const steps=[
"Uploading resume...",
"Analyzing experience...",
"Checking references...",
"Evaluating skills...",
"Matching company culture...",
"Final HR review...",
"Preparing result..."
];

let progress=0;

const timer=setInterval(()=>{
progress+=2;
bar.style.width=progress+'%';

if(progress<15) status.innerText=steps[0];
else if(progress<30) status.innerText=steps[1];
else if(progress<45) status.innerText=steps[2];
else if(progress<60) status.innerText=steps[3];
else if(progress<75) status.innerText=steps[4];
else if(progress<90) status.innerText=steps[5];
else status.innerText=steps[6];

if(progress>=100){
clearInterval(timer);
document.getElementById('stage2').classList.add('hidden');
document.getElementById('stage3').classList.remove('hidden');
}
},80);
}
</script>

</body>
</html>
